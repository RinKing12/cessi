<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wichtige Anfrage 🐱</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Nunito', sans-serif;
    overflow: hidden;
  }

  .card {
    background: white;
    border-radius: 28px;
    padding: 48px 52px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    max-width: 480px;
    width: 90vw;
    position: relative;
    z-index: 10;
  }

  .cat-img {
    width: 160px;
    height: 160px;
    object-fit: cover;
    border-radius: 50%;
    border: 6px solid #fcb69f;
    margin-bottom: 24px;
    display: block;
    margin-left: auto;
    margin-right: auto;
  }

  h1 {
    font-family: 'Fredoka One', cursive;
    font-size: 1.9rem;
    color: #2d2d2d;
    line-height: 1.3;
    margin-bottom: 36px;
  }

  .btn-group {
    display: flex;
    gap: 20px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .btn {
    font-family: 'Nunito', sans-serif;
    font-size: 1.2rem;
    font-weight: 700;
    padding: 16px 44px;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.1s;
  }

  .btn-ja {
    background: #4cde8a;
    color: white;
    box-shadow: 0 6px 20px rgba(76,222,138,0.4);
  }
  .btn-ja:hover { transform: scale(1.05); box-shadow: 0 8px 25px rgba(76,222,138,0.5); }
  .btn-ja:active { transform: scale(0.97); }

  .btn-nein {
    background: #ff6b6b;
    color: white;
    box-shadow: 0 6px 20px rgba(255,107,107,0.4);
    transition: none;
  }
  .btn-nein.floating {
    position: fixed;
  }
  .btn-nein:hover { transform: scale(1.05); }

  .success-screen {
    display: none;
    flex-direction: column;
    align-items: center;
  }
  .success-screen.active { display: flex; }
  .question-screen.hidden { display: none; }

  .success-screen .cat-img {
    width: 200px;
    height: 200px;
    border-color: #4cde8a;
    animation: bounce 0.6s ease;
  }

  .success-title {
    font-family: 'Fredoka One', cursive;
    font-size: 2.4rem;
    color: #2d2d2d;
    margin-bottom: 8px;
  }

  .success-sub {
    font-size: 1.1rem;
    color: #888;
    margin-bottom: 10px;
  }

  .confetti-emoji {
    font-size: 2.5rem;
    animation: spin 1s ease-out;
    display: block;
    margin-top: 12px;
  }

  @keyframes bounce {
    0% { transform: scale(0.5); opacity: 0; }
    60% { transform: scale(1.15); }
    100% { transform: scale(1); opacity: 1; }
  }

  @keyframes spin {
    0% { transform: rotate(-20deg) scale(0); opacity: 0; }
    100% { transform: rotate(10deg) scale(1); opacity: 1; }
  }
</style>
</head>
<body>

<div class="card" id="mainCard">
  <div class="question-screen" id="questionScreen">
    <img class="cat-img" src="https://cataas.com/cat?width=300&height=300&t=1" alt="Süße Katze" onerror="this.src='https://placekitten.com/300/300'" />
    <h1>Darf ich heute um 14 Uhr heimgehen? 🥺</h1>
    <div class="btn-group">
      <button class="btn btn-ja" onclick="jaGeklickt()">✅ Ja</button>
      <button class="btn btn-nein" id="neinBtn" onclick="neinGeklickt()">❌ Nein</button>
    </div>
  </div>

  <div class="success-screen" id="successScreen">
    <img class="cat-img" src="https://cataas.com/cat?width=400&height=400&t=2" alt="Glückliche Katze" onerror="this.src='https://placekitten.com/400/400'" />
    <div class="success-title">Du bester Chef! 🎉</div>
    <div class="success-sub">Danke danke danke! 😻</div>
    <span class="confetti-emoji">🐾</span>
  </div>
</div>

<script>
  const neinBtn = document.getElementById('neinBtn');
  let neinCount = 0;

  function positionNeinBtn() {
    const margin = 60;
    const bw = neinBtn.offsetWidth || 140;
    const bh = neinBtn.offsetHeight || 56;
    const maxX = window.innerWidth - bw - margin;
    const maxY = window.innerHeight - bh - margin;
    const x = margin + Math.random() * maxX;
    const y = margin + Math.random() * maxY;
    neinBtn.style.left = x + 'px';
    neinBtn.style.top = y + 'px';
    neinBtn.style.bottom = 'auto';
    neinBtn.style.right = 'auto';
  }

  function neinGeklickt() {
    neinCount++;

    if (neinCount === 1) {
      const rect = neinBtn.getBoundingClientRect();
      neinBtn.classList.add('floating');
      neinBtn.style.left = rect.left + 'px';
      neinBtn.style.top = rect.top + 'px';
      setTimeout(positionNeinBtn, 10);
    } else {
      positionNeinBtn();
    }

    const messages = [
      '❌ Nein', '😤 Immer noch Nein!', '🙅 Nope!',
      '😂 Vergiss es!', '🏃 Fang mich!', '🙈 Nie!',
      '💨 Nein nein nein!', '🐱 Miau? Nein.', '😈 Haha nein!',
      '🚫 Nicht mal!', '😜 Erwisch mich!', '🤣 LOL nein!'
    ];
    neinBtn.textContent = messages[Math.min(neinCount - 1, messages.length - 1)];

    if (neinCount >= 3) {
      const jaBtn = document.querySelector('.btn-ja');
      const size = Math.min(2.2, 1.2 + neinCount * 0.2);
      jaBtn.style.transform = `scale(${size})`;
    }
  }

  function jaGeklickt() {
    document.getElementById('questionScreen').classList.add('hidden');
    document.getElementById('successScreen').classList.add('active');
  }
</script>
</body>
</html>
